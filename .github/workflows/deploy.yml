name: Deploy to Cloud86

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /httpdocs/
          protocol: ftps
          security: loose
          timeout: 180000
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
            **/node_modules/**
            betamotor/**
            goes/**
            royalenfield/**
            design-system/**
