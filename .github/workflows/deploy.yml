name: Deploy to Cloud86

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find remote path and deploy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: 'index.html,style.css,main.js,Hero/*,Images/*'
          target: '/domains/svtester.cfmoto-atv-motorrad.de/public_html'
